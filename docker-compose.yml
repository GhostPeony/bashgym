# GhostWork Development Stack
# Usage:
#   docker compose up                    # Start API + assistant gateway
#   docker compose up bashgym-api        # API only
#   docker compose up peony-gateway   # Assistant only (needs API)
#   docker compose run --rm peony-agent -m "system status"  # One-shot query

services:
  # ─────────────────────────────────────
  # BashGym API (FastAPI backend)
  # ─────────────────────────────────────
  bashgym-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: bashgym-api
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ./data:/app/data
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────
  # Peony Gateway (long-running bot)
  # ─────────────────────────────────────
  peony-gateway:
    build:
      context: ./assistant
      dockerfile: Dockerfile
    container_name: peony-gateway
    depends_on:
      bashgym-api:
        condition: service_healthy
    volumes:
      - ./assistant/workspace:/home/peony/.peony/workspace
      - ./assistant/config/config.json:/home/peony/.peony/config.json:ro
    env_file: ./assistant/.env
    environment:
      - BASHGYM_API_URL=http://bashgym-api:8003/api
      - BASHGYM_API_KEY
    restart: unless-stopped
    command: ["gateway"]

  # ─────────────────────────────────────
  # Peony Agent (one-shot query)
  #   docker compose run --rm peony-agent -m "check system status"
  # ─────────────────────────────────────
  peony-agent:
    build:
      context: ./assistant
      dockerfile: Dockerfile
    container_name: peony-agent
    profiles:
      - agent
    depends_on:
      bashgym-api:
        condition: service_healthy
    volumes:
      - ./assistant/workspace:/home/peony/.peony/workspace
      - ./assistant/config/config.json:/home/peony/.peony/config.json:ro
    env_file: ./assistant/.env
    environment:
      - BASHGYM_API_URL=http://bashgym-api:8003/api
      - BASHGYM_API_KEY
    entrypoint: ["peony", "agent"]
    stdin_open: true
    tty: true
