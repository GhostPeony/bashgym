name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Keep the canonical quality gate small and deterministic. Compatibility and
  # installed-wheel behavior are exercised separately below.
  python-quality:
    name: Python Quality (3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Lockfile check
        run: uv lock --check

      - name: Install locked development tools
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check bashgym/

      - name: Black check
        run: uv run black --check bashgym/

  python-compatibility:
    name: Python ${{ matrix.python }} / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            python: "3.10"
            full_suite: false
          - os: ubuntu-latest
            platform: Linux
            python: "3.11"
            full_suite: false
          - os: ubuntu-latest
            platform: Linux
            python: "3.12"
            full_suite: true
          - os: windows-latest
            platform: Windows
            python: "3.12"
            full_suite: false
          - os: macos-latest
            platform: macOS
            python: "3.12"
            full_suite: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked test environment
        run: uv sync --frozen --extra dev

      # This runs first on every supported interpreter/OS. It builds the public
      # wheel and proves its installed CLI/skills work outside the checkout.
      - name: Packaging and installed-wheel tests
        env:
          OLLAMA_ENABLED: "false"
        run: uv run --with pip --with setuptools --with wheel pytest tests/packaging -m "not network and not integration and not slow" -x -v --tb=short --timeout=300

      - name: Remaining non-network tests
        if: matrix.full_suite
        env:
          OLLAMA_ENABLED: "false"
        # The retired February multi-agent Orchestrator is quarantined until its
        # separately planned removal; it is not part of AutoResearch or the
        # supported contributor loop.
        run: uv run pytest tests/ --ignore=tests/packaging --ignore=tests/orchestrator -m "not network and not integration and not slow" -x -v --tb=short --timeout=30

  frontend-quality:
    name: Frontend Quality (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies without native lifecycle scripts
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Build web application
        run: npm run web:build

  electron-native-build:
    name: Electron Unpacked / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
            artifact: electron-linux-unpacked
          - os: windows-latest
            platform: Windows
            artifact: electron-windows-unpacked
          - os: macos-latest
            platform: macOS
            artifact: electron-macos-unpacked
    defaults:
      run:
        working-directory: frontend
    env:
      # Produce unsigned CI artifacts; release signing belongs in a separate,
      # secret-bearing release workflow.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Native lifecycle scripts are intentional in this target-native job so
      # node-pty is installed/rebuilt for the host OS and architecture.
      - name: Install target-native dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Rebuild native Electron dependencies
        timeout-minutes: 5
        run: npx electron-builder install-app-deps

      - name: Build renderer and Electron processes
        timeout-minutes: 10
        run: npx vite build

      - name: Build unsigned unpacked application
        timeout-minutes: 10
        run: npx electron-builder --dir --publish never

      - name: Smoke unpacked application (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 2
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npm run electron:smoke:packaged

      - name: Smoke unpacked application (Windows and macOS)
        if: runner.os != 'Linux'
        timeout-minutes: 2
        run: npm run electron:smoke:packaged

      - name: Upload unpacked application
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/release/**
          if-no-files-found: error
          retention-days: 3
