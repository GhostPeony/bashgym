services:
  # ─────────────────────────────────────────────
  # Peony Agent (one-shot query)
  #   docker compose run --rm peony-agent -m "Hello"
  # ─────────────────────────────────────────────
  peony-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peony-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/root/.peony/config.json:ro
      - peony-workspace:/root/.peony/workspace
    entrypoint: ["peony", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Peony Gateway (Long-running Bot)
  #   docker compose up peony-gateway
  # ─────────────────────────────────────────────
  peony-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peony-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/root/.peony/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - peony-workspace:/root/.peony/workspace
    command: ["gateway"]

volumes:
  peony-workspace:
