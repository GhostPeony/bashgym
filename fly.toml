app = "bashgym"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.web"

[env]
  BASHGYM_MODE = "web"
  HOST = "0.0.0.0"
  PORT = "8003"

[http_service]
  internal_port = 8003
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "bashgym_data"
  destination = "/app/data"
